<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#a6193c">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Acompanhar Jogo - Bolão da Administração</title>
  </head>
  <body data-page="jogo">
    <div class="app-shell">
      <aside class="side-nav" aria-label="Navegação principal">
        <a class="brand" href="index.html"><img src="assets/logos/logo.svg" alt=""><span>Bolão da<br>Administração</span></a>
        <nav>
          <a href="index.html" data-nav="home">Início</a>
          <a href="palpite.html" data-nav="palpite">Palpite</a>
          <a href="ranking.html" data-nav="ranking">Ranking</a>
          <a href="jogo.html" data-nav="jogo">Jogo</a>
          <a href="login.html" data-nav="admin">Admin</a>
        </nav>
        <button class="theme-toggle" data-action="theme" type="button">Modo escuro</button>
      </aside>

      <main class="main-content">
        <section class="live-scoreboard">
          <div class="team">
            <img src="assets/bandeiras/brasil.svg" alt="">
            <span data-game-home>Brasil</span>
          </div>
          <div class="score-center">
            <span data-game-status>Pré-jogo</span>
            <strong><span data-game-home-score>0</span> x <span data-game-away-score>0</span></strong>
            <small data-game-minute>00:00</small>
          </div>
          <div class="team">
            <img src="assets/bandeiras/noruega.svg" alt="">
            <span data-game-away>Noruega</span>
          </div>
        </section>

        <section class="admin-live-controls is-hidden" data-live-controls>
          <button class="btn btn-primary" data-goal="home" type="button">Gol Brasil</button>
          <button class="btn btn-primary" data-goal="away" type="button">Gol adversário</button>
          <button class="btn btn-secondary" data-match-finish type="button">Fim do jogo</button>
        </section>

        <section class="metric-grid" data-live-kpis></section>

        <section class="content-band">
          <h2>Vencedores em tempo real</h2>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>Ambiente</th>
                  <th>Telefone</th>
                  <th>Palpite</th>
                  <th>Prêmio</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody data-winners-table></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div class="bottom-nav" aria-label="Navegação móvel">
      <a href="index.html" data-nav="home">Início</a>
      <a href="palpite.html" data-nav="palpite">Palpite</a>
      <a href="ranking.html" data-nav="ranking">Ranking</a>
      <a href="jogo.html" data-nav="jogo">Jogo</a>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
