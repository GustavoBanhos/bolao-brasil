<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#a6193c">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Ranking - Bolão da Administração</title>
  </head>
  <body data-page="ranking">
    <div class="app-shell">
      <aside class="side-nav" aria-label="Navegação principal">
        <a class="brand" href="index.html"><img src="assets/logos/logo.svg" alt=""><span>Bolão da<br>Administração</span></a>
        <nav>
          <a href="index.html" data-nav="home">Início</a>
          <a href="palpite.html" data-nav="palpite">Palpite</a>
          <a href="ranking.html" data-nav="ranking">Ranking</a>
          <a href="jogo.html" data-nav="jogo">Jogo</a>
          <a href="login.html" data-nav="admin">Admin</a>
        </nav>
        <button class="theme-toggle" data-action="theme" type="button">Modo escuro</button>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <span class="eyebrow">Ranking público</span>
          <h1>Palpites mais apostados</h1>
          <p>Veja a concentração dos placares e acompanhe o bolão.</p>
        </header>

        <section class="metric-grid" data-ranking-kpis></section>

        <section class="dashboard-grid">
          <article class="chart-panel">
            <h2>Ranking dos placares</h2>
            <canvas id="rankingChart" height="260"></canvas>
          </article>
          <article class="chart-panel">
            <h2>Distribuição por pagamento</h2>
            <canvas id="paymentChart" height="260"></canvas>
          </article>
        </section>

        <section class="content-band">
          <h2>Heatmap Brasil x adversário</h2>
          <div class="heatmap-scroll" data-heatmap></div>
        </section>
      </main>
    </div>

    <div class="bottom-nav" aria-label="Navegação móvel">
      <a href="index.html" data-nav="home">Início</a>
      <a href="palpite.html" data-nav="palpite">Palpite</a>
      <a href="ranking.html" data-nav="ranking">Ranking</a>
      <a href="jogo.html" data-nav="jogo">Jogo</a>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
