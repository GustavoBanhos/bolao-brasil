<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#a6193c">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Login - Bolão da Administração</title>
  </head>
  <body data-page="login">
    <div class="app-shell">
      <aside class="side-nav" aria-label="Navegação principal">
        <a class="brand" href="index.html" aria-label="Bolão da Administração">
          <img src="assets/logos/logo.svg" alt="">
          <span>Bolão da<br>Administração</span>
        </a>
        <nav>
          <a href="index.html" data-nav="home">Início</a>
          <a href="palpite.html" data-nav="palpite">Palpite</a>
          <a href="ranking.html" data-nav="ranking">Ranking</a>
          <a href="jogo.html" data-nav="jogo">Jogo</a>
          <a href="login.html" data-nav="login">Admin</a>
        </nav>
        <button class="theme-toggle" data-action="theme" type="button">Modo escuro</button>
      </aside>

      <main class="main-content narrow">
        <section class="login-panel">
          <header class="page-header">
            <span class="eyebrow">Acesso restrito</span>
            <h1>Painel administrativo</h1>
            <p>Use o e-mail autorizado e a senha cadastrada no Firebase Authentication.</p>
          </header>
          <form id="loginForm" class="smart-form small" autocomplete="on">
            <label>E-mail<input type="email" name="email" required autocomplete="username" placeholder="gustavoitalo1224@gmail.com"></label>
            <label>Senha<input type="password" name="password" required autocomplete="current-password" placeholder="Sua senha do Firebase"></label>
            <button class="btn btn-primary btn-lg" type="submit">Entrar</button>
          </form>
        </section>
      </main>
    </div>

    <div class="bottom-nav" aria-label="Navegação móvel">
      <a href="index.html" data-nav="home">Início</a>
      <a href="palpite.html" data-nav="palpite">Palpite</a>
      <a href="ranking.html" data-nav="ranking">Ranking</a>
      <a href="jogo.html" data-nav="jogo">Jogo</a>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
