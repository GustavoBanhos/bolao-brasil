<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#a6193c">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Admin - Bolão da Administração</title>
  </head>
  <body data-page="admin">
    <div class="app-shell">
      <aside class="side-nav" aria-label="Navegação principal">
        <a class="brand" href="index.html"><img src="assets/logos/logo.svg" alt=""><span>Bolão da<br>Administração</span></a>
        <nav>
          <a href="index.html" data-nav="home">Início</a>
          <a href="palpite.html" data-nav="palpite">Palpite</a>
          <a href="ranking.html" data-nav="ranking">Ranking</a>
          <a href="jogo.html" data-nav="jogo">Jogo</a>
          <a href="login.html" data-nav="admin">Admin</a>
        </nav>
        <button class="theme-toggle" data-action="theme" type="button">Modo escuro</button>
      </aside>

      <main class="main-content">
        <section class="admin-panel is-hidden" data-admin-panel>
          <div class="admin-topbar">
            <div>
              <span class="eyebrow">Dashboard</span>
              <h1>Gestão do bolão</h1>
            </div>
            <button class="btn btn-outline-secondary" data-admin-logout type="button">Sair</button>
          </div>

          <section class="metric-grid" data-admin-kpis></section>

          <section class="dashboard-grid">
            <article class="form-panel">
              <h2>Jogo</h2>
              <form id="gameForm" class="smart-form compact">
                <input type="hidden" name="id">
                <div class="field-row">
                  <label>Mandante<input name="teamHome" required value="Brasil"></label>
                  <label>Adversário<input name="teamAway" required value="Noruega"></label>
                </div>
                <div class="field-row">
                  <label>Data<input name="date" type="date" required></label>
                  <label>Horário<input name="time" type="time" required></label>
                </div>
                <label>Local<input name="location" required></label>
                <div class="field-row">
                  <label>Valor da aposta<input name="betValue" type="number" min="1" step="0.01" required></label>
                  <label>Prêmio %<input name="prizePercent" type="number" min="1" max="100" step="1" required></label>
                </div>
                <label>Chave Pix<input name="pixKey" required></label>
                <label>QR Code Pix / Payload<textarea name="pixPayload" rows="3" required></textarea></label>
                <div class="field-row">
                  <label>Campeonato<input name="championship"></label>
                  <label>Imagem do jogo<input name="imageUrl" placeholder="URL da imagem"></label>
                </div>
                <div class="switch-row">
                  <label><input name="isOpen" type="checkbox" checked> Apostas abertas</label>
                  <label><input name="active" type="checkbox" checked> Jogo ativo</label>
                </div>
                <button class="btn btn-primary" type="submit">Salvar jogo</button>
              </form>
            </article>

            <article class="form-panel">
              <h2>Tempo real</h2>
              <div class="live-admin-score">
                <strong><span data-admin-home-score>0</span> x <span data-admin-away-score>0</span></strong>
                <span data-admin-status>Pré-jogo</span>
              </div>
              <div class="button-grid">
                <button class="btn btn-primary" data-goal="home" type="button">Gol Brasil</button>
                <button class="btn btn-primary" data-goal="away" type="button">Gol adversário</button>
                <button class="btn btn-secondary" data-undo-goal="home" type="button">- Brasil</button>
                <button class="btn btn-secondary" data-undo-goal="away" type="button">- Adversário</button>
              </div>
              <form id="statusForm" class="smart-form compact mt-3">
                <div class="field-row">
                  <label>Status<input name="matchStatus" placeholder="Ao vivo"></label>
                  <label>Tempo<input name="matchMinute" placeholder="45:00"></label>
                </div>
                <button class="btn btn-outline-secondary" type="submit">Atualizar status</button>
              </form>
            </article>
          </section>

          <section class="content-band">
            <div class="section-head">
              <h2>Palpites</h2>
              <button class="btn btn-outline-danger" data-delete-game type="button">Excluir jogo ativo</button>
            </div>
            <div class="filters">
              <input data-filter="name" placeholder="Nome">
              <input data-filter="phone" placeholder="Telefone">
              <input data-filter="environment" placeholder="Ambiente">
              <select data-filter="paymentStatus">
                <option value="">Pagamento</option>
                <option value="paid">Pago</option>
                <option value="pending">Pendente</option>
              </select>
              <input data-filter="score" placeholder="Placar, ex. 2 x 1">
              <input data-filter="date" type="date">
            </div>
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Ambiente</th>
                    <th>Palpite</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Pagamento</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody data-admin-bets></tbody>
              </table>
            </div>
          </section>

          <section class="dashboard-grid">
            <article class="chart-panel">
              <h2>Simulador</h2>
              <div class="score-picker small">
                <label>Brasil<input data-sim-home type="number" min="0" max="20" value="0"></label>
                <strong>x</strong>
                <label>Adversário<input data-sim-away type="number" min="0" max="20" value="0"></label>
              </div>
              <div class="metric-grid compact" data-simulator-kpis></div>
              <div class="table-wrap">
                <table class="data-table">
                  <thead><tr><th>Nome</th><th>Ambiente</th><th>Telefone</th><th>Palpite</th><th>Prêmio</th></tr></thead>
                  <tbody data-simulator-winners></tbody>
                </table>
              </div>
            </article>
            <article class="chart-panel">
              <h2>Heatmap</h2>
              <div class="heatmap-scroll" data-heatmap></div>
            </article>
          </section>
        </section>
      </main>
    </div>

    <div class="bottom-nav" aria-label="Navegação móvel">
      <a href="index.html" data-nav="home">Início</a>
      <a href="palpite.html" data-nav="palpite">Palpite</a>
      <a href="ranking.html" data-nav="ranking">Ranking</a>
      <a href="jogo.html" data-nav="jogo">Jogo</a>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
